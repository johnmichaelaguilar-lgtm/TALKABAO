<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TALKABAO</title>
</head>
<body>

<h1>TALKABAO</h1>
<textarea id="inputText" rows="4" cols="40" placeholder="Type text here..."></textarea>
<br>
<select id="targetLang">
    <option value="es">Spanish</option>
    <option value="fr">French</option>
    <option value="de">German</option>
    <option value="ja">Japanese</option>
    <option value="ko">Korean</option>
    <option value="tl">Filipino</option>
</select>
<br>
<button id="translateBtn">Translate</button>

<p id="status">Status: Ready</p>
<p id="translatedText"></p>

<script>
const translateBtn = document.getElementById("translateBtn");
const inputText = document.getElementById("inputText");
const targetLang = document.getElementById("targetLang");
const translatedText = document.getElementById("translatedText");
const status = document.getElementById("status");

translateBtn.addEventListener("click", async () => {
    const text = inputText.value.trim();
    if (!text) return alert("Type something!");

    status.textContent = "Status: Translating...";
    translatedText.textContent = "";

    try {
        const res = await fetch("https://libretranslate.com/translate", {
            method: "POST",
            body: JSON.stringify({
                q: text,
                source: "en",
                target: targetLang.value,
                format: "text"
            }),
            headers: { "Content-Type": "application/json" }
        });
        const data = await res.json();
        translatedText.textContent = data.translatedText || "No translation returned.";
        status.textContent = "Status: Ready";
    } catch (err) {
        console.error(err);
        status.textContent = "Status: Error!";
        alert("Translation failed: " + err.message);
    }
});
</script>

</body>
</html>
