<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="welcome-page">

    <div class="header-logo">
        <h1 class="title" style="color: #8cc63f;">TALKABAO</h1>
    </div>

    <div class="mainContainer splash-container">
        <div class="welcome-art">
            <img src="welcome.png" id="welcomePng" alt="Welcome Illustration">
        </div>

        <div class="translate-action">
            <a href="home.html" class="big-translate-btn start-btn">START!</a>
        </div>
    </div>

    <div class="footer-tools">
        <a id="muteBtn" class="muteBtn">
            <img src="music.png" alt="Music icon" width="40">
        </a>
        <a href="settings.html" class="settingsBtn">
            <img src="settings.png" alt="Settings icon" width="40">
        </a>
    </div>

    <audio id="bgMusic" loop>
        <source src="furryFriendsBGMusic.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Your existing JS stays here - no changes needed!
        const bgMusic = document.getElementById("bgMusic");
        const muteBtn = document.getElementById("muteBtn");
        bgMusic.volume = 1; 
        bgMusic.muted = true;  

        const startAndUnmute = () => {
            bgMusic.muted = false; 
            bgMusic.play().catch(() => {});
            document.removeEventListener("click", startAndUnmute);
        };

        document.addEventListener("click", startAndUnmute);

        muteBtn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation(); 
            bgMusic.muted = !bgMusic.muted;
            muteBtn.style.opacity = bgMusic.muted ? "0.5" : "1";
            if (!bgMusic.muted && bgMusic.paused) { bgMusic.play(); }
        });
    </script>
</body>
</html>
