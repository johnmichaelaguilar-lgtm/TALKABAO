<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Translator</title>
</head>
<body>
  <textarea id="text" placeholder="Type Tagalog text here..."></textarea><br>
  <select id="lang">
    <option value="en">English</option>
    <option value="es">Spanish</option>
    <option value="fr">French</option>
    <option value="de">German</option>
    <option value="ja">Japanese</option>
  </select>
  <button onclick="translate()">Translate</button>
  <div id="result"></div>

  <script>
    async function translate() {
      const text = document.getElementById("text").value;
      const target = document.getElementById("lang").value;
      document.getElementById("result").innerText = "Translating...";

      try {
        const res = await fetch("http://localhost:3000/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ q: text, target })
        });
        const data = await res.json();
        document.getElementById("result").innerText = data.translatedText || data.error;
      } catch (err) {
        document.getElementById("result").innerText = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
