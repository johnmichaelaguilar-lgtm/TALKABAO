<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>High-Accuracy Free Translator</title>
    <style>
    </style>
</head>
<body>

<div class="container">
    <h2>Reliable Free Translator</h2>
    <textarea id="sourceText" placeholder="Type something here..."></textarea>
    
    <div class="controls">
        <select id="targetLang">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="tl">Tagalog</option>
            <option value="ja">Japanese</option>
        </select>
        <button id="translateBtn">Translate</button>
    </div>

    <div id="output">Result will appear here...</div>
</div>

<script>
    const btn = document.getElementById('translateBtn');
    const input = document.getElementById('sourceText');
    const output = document.getElementById('output');
    const target = document.getElementById('targetLang');

    // List of public Lingva instances (if one is slow, you can try another)
    const API_BASE = "https://lingva.ml/api/v1"; 

    btn.addEventListener('click', async () => {
        const text = input.value.trim();
        if (!text) return;

        btn.disabled = true;
        btn.innerText = "Processing...";
        output.style.color = "#666";

        try {
            // Lingva Format: /api/v1/:source/:target/:query
            const url = `${API_BASE}/auto/${target.value}/${encodeURIComponent(text)}`;
            
            const response = await fetch(url);
            const data = await response.json();

            if (data.translation) {
                output.innerText = data.translation;
                output.style.color = "#000";
            } else {
                throw new Error("No translation returned");
            }
        } catch (err) {
            output.innerText = "Error: API limit reached or instance down. Try again in a moment.";
            output.style.color = "red";
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.innerText = "Translate";
        }
    });
</script>

</body>
</html>
